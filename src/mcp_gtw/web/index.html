<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{name}</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><text x='16' y='23' font-size='21' font-family='system-ui,sans-serif' font-weight='700' text-anchor='middle' fill='white'>{initial}</text></svg>"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="h-full bg-slate-950 text-slate-100 antialiased">
        <main class="flex min-h-full items-center justify-center px-6">
            <div class="text-center">
                <span
                    class="mb-6 inline-block rounded-full border border-slate-700 px-3 py-1 text-xs uppercase tracking-widest text-teal-300"
                >
                    Model Context Protocol
                </span>
                <img src="logo.svg" alt="{name}" class="mx-auto mb-6 w-64 max-w-full" />
                <h1 class="text-2xl font-semibold tracking-tight text-slate-300">{name}</h1>
            </div>
        </main>
    </body>
</html>
