# Reverse proxy for an app built on mcp-gateway, behind Cloudflare.
#
# Cloudflare terminates TLS, so nginx serves plain HTTP: it serves your app's static frontend
# directly (fast, and it takes that load off the app) and proxies only the dynamic endpoints to the
# app — the MCP endpoint (/mcp), the provider WebSocket (/provider), and whatever routes your app
# adds. Works for any app — a site, a game, anything — the frontend is just static files.
#
# Adjust server_name, the `app` upstream, the static root, and your own routes. Docker wiring: mount
# your built frontend at /srv/web and make sure `app` resolves to the app container. Lock the origin
# to Cloudflare's IP ranges at your firewall so nobody reaches it directly.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Upgrade a request to a WebSocket only when the client asked for it.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream app {
        server app:8000;   # match your app service name / host:port
    }

    server {
        listen 80;
        server_name app.example.com;

        # ---- MCP endpoint (Streamable HTTP / SSE) ----
        location /mcp {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;   # the gateway needs the Bearer token
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;   # https, from Cloudflare
            proxy_buffering off;         # SSE must stream, never buffer
            proxy_read_timeout 300s;     # allow slow tool calls
        }

        # ---- Provider WebSocket ----
        location /provider {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;   # the gateway enforces an allowed Origin
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 3600s;
        }

        # ---- Your app's own routes ----
        # Proxy whatever HTTP paths your app adds (rename /api/ to your prefix). For an extra app
        # WebSocket, copy the /provider block above under its path.
        location /api/ {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # ---- Static frontend, served straight from disk ----
        root /srv/web;

        # Static assets. If your build content-hashes filenames, raise this to `expires 1y; immutable`.
        location ~* \.(css|js|mjs|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        # Everything else falls back to the app shell.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
